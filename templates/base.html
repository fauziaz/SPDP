{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPDP — {% block title %}Sistem Pakar Deteksi Risiko Preeklampsia{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'style.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/" class="navbar-brand">
    <div class="logo-icon"><i class="fa-solid fa-heart-pulse"></i></div>
    <div>
      <div class="brand-text">SPDP</div>
      <div class="brand-sub">Deteksi Risiko Preeklampsia</div>
    </div>
  </a>
  <ul class="nav-links">
    <li>
      <a href="{% url 'diagnosis' %}" {% if request.resolver_match.url_name == 'diagnosis' %}class="active"{% endif %}>
        <i class="fa-solid fa-stethoscope"></i>
        <span class="nav-text">Diagnosis</span>
      </a>
    </li>
    <li>
      <a href="{% url 'dashboard' %}" {% if request.resolver_match.url_name == 'dashboard' %}class="active"{% endif %}>
        <i class="fa-solid fa-chart-line"></i>
        <span class="nav-text">Dashboard</span>
      </a>
    </li>
    <li>
      <a href="{% url 'rules' %}" {% if request.resolver_match.url_name == 'rules' %}class="active"{% endif %}>
        <i class="fa-solid fa-list-check"></i>
        <span class="nav-text">Rule Base</span>
      </a>
    </li>
      {% comment %}
      <li>
        <a href="{% url 'evaluation' %}" {% if request.resolver_match.url_name == 'evaluation' %}class="active"{% endif %}>
          <i class="fa-solid fa-chart-bar"></i>
          <span class="nav-text">Evaluasi</span>
        </a>
      </li>
      {% endcomment %}
  </ul>
</nav>

{% block content %}{% endblock %}

</body>
</html>
